name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: Deploy all services (ignore path filter)
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        env:
          DEPLOY_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_all && '1' || '0' }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash infra/detect-changed-services.sh >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy changed services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x infra/deploy-remote.sh
            USE_PROD_COMPOSE=1 ./infra/deploy-remote.sh ${{ join(fromJson(needs.detect.outputs.services), ' ') }}
