# HTTP only — used before Let's Encrypt certificate is issued
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN} ${ADMIN_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'SSL certificate is being configured. Try again in a minute.';
        add_header Content-Type text/plain;
    }
}
